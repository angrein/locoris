name: Tauri desktop (Windows)

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  LOCORIS_DESKTOP_BUILD: "true"
  VITE_GOOGLE_DRIVE_CLIENT_ID: ${{ vars.VITE_GOOGLE_DRIVE_CLIENT_ID }}
  VITE_GOOGLE_DRIVE_DESKTOP_CLIENT_ID: ${{ vars.VITE_GOOGLE_DRIVE_DESKTOP_CLIENT_ID }}
  VITE_GOOGLE_DRIVE_DESKTOP_CLIENT_SECRET: ${{ vars.VITE_GOOGLE_DRIVE_DESKTOP_CLIENT_SECRET }}

permissions:
  contents: read

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/app/src-tauri -> apps/app/src-tauri/target

      - name: Install deps
        run: npm ci

      - name: Validate Google Drive OAuth env
        run: >
          node -e "const required=['VITE_GOOGLE_DRIVE_CLIENT_ID','VITE_GOOGLE_DRIVE_DESKTOP_CLIENT_ID'];
          const missing=required.filter((key)=>!process.env[key]||!process.env[key].trim());
          if(missing.length){console.error('Missing GitHub Actions variables: '+missing.join(', ')); process.exit(1);}"

      - name: Build Windows installer
        run: npm run desktop:build --workspace @locoris/app

      - name: Upload bundles
        uses: actions/upload-artifact@v4
        with:
          name: locoris-windows-bundle
          path: apps/app/src-tauri/target/release/bundle/
