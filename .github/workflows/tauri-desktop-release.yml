name: Tauri desktop release

on:
  push:
    tags:
      - "app-v*"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  LOCORIS_DESKTOP_BUILD: "true"

permissions:
  contents: write

jobs:
  release-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: ""
          - platform: windows-latest
            args: ""
    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/app/src-tauri -> apps/app/src-tauri/target

      - name: Install deps
        run: npm ci

      - name: Build and publish Locoris desktop release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/app
          tagName: app-v__VERSION__
          releaseName: Locoris App __VERSION__
          releaseBody: Desktop release for Locoris __VERSION__.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
