name: Tauri release

on:
  push:
    tags:
      - "app-v*"
  workflow_dispatch:

concurrency:
  group: tauri-release-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  NODE_VERSION: "24"
  JAVA_VERSION: "17"
  ANDROID_NDK_VERSION: "27.0.12077973"
  NPM_CONFIG_FETCH_RETRIES: "5"
  NPM_CONFIG_FETCH_RETRY_FACTOR: "2"
  NPM_CONFIG_FETCH_RETRY_MINTIMEOUT: "20000"
  NPM_CONFIG_FETCH_RETRY_MAXTIMEOUT: "120000"
  VITE_GOOGLE_DRIVE_CLIENT_ID: ${{ vars.VITE_GOOGLE_DRIVE_CLIENT_ID }}
  VITE_GOOGLE_DRIVE_DESKTOP_CLIENT_ID: ${{ vars.VITE_GOOGLE_DRIVE_DESKTOP_CLIENT_ID }}

permissions:
  contents: write

jobs:
  release-desktop:
    name: Release desktop (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: ""
          - platform: windows-latest
            args: ""
    runs-on: ${{ matrix.platform }}
    env:
      LOCORIS_DESKTOP_BUILD: "true"
      VITE_GOOGLE_DRIVE_DESKTOP_CLIENT_SECRET: ${{ secrets.VITE_GOOGLE_DRIVE_DESKTOP_CLIENT_SECRET }}

    steps:
      - uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/app/src-tauri -> apps/app/src-tauri/target

      - name: Install deps
        shell: bash
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            if npm ci --prefer-offline --no-audit; then
              exit 0
            fi
            if [ "${attempt}" = "3" ]; then
              exit 1
            fi
            sleep $((attempt * 20))
          done

      - name: Validate Google Drive OAuth env
        run: >
          node -e "const required=['VITE_GOOGLE_DRIVE_CLIENT_ID','VITE_GOOGLE_DRIVE_DESKTOP_CLIENT_ID'];
          const missing=required.filter((key)=>!process.env[key]||!process.env[key].trim());
          if(missing.length){console.error('Missing GitHub Actions variables: '+missing.join(', ')); process.exit(1);}"

      - name: Build and publish Locoris desktop release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/app
          tagName: app-v__VERSION__
          releaseName: Locoris __VERSION__
          releaseBody: |
            Locoris __VERSION__ release.

            This release contains desktop update assets for macOS and Windows. Android APK assets are uploaded by the Android release job after the signed APK is built.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

  build-android-apk:
    name: Build Android release APK
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.package.outputs.version }}
      tag: ${{ steps.package.outputs.tag }}
      apk_name: ${{ steps.package.outputs.apk_name }}
    env:
      LOCORIS_ANDROID_BUILD: "true"

    steps:
      - uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Install Android NDK
        run: sdkmanager "ndk;${ANDROID_NDK_VERSION}"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/app/src-tauri -> apps/app/src-tauri/target

      - name: Install deps
        shell: bash
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            if npm ci --prefer-offline --no-audit; then
              exit 0
            fi
            if [ "${attempt}" = "3" ]; then
              exit 1
            fi
            sleep $((attempt * 20))
          done

      - name: Typecheck
        run: npm run typecheck --workspace @locoris/app

      - name: Build web assets
        run: npm run build --workspace @locoris/app

      - name: Validate Android release signing secrets
        run: |
          missing=()
          [ -n "${ANDROID_RELEASE_KEYSTORE_BASE64}" ] || missing+=("ANDROID_RELEASE_KEYSTORE_BASE64")
          [ -n "${ANDROID_RELEASE_KEYSTORE_PASSWORD}" ] || missing+=("ANDROID_RELEASE_KEYSTORE_PASSWORD")
          [ -n "${ANDROID_RELEASE_KEY_ALIAS}" ] || missing+=("ANDROID_RELEASE_KEY_ALIAS")
          [ -n "${ANDROID_RELEASE_KEY_PASSWORD}" ] || missing+=("ANDROID_RELEASE_KEY_PASSWORD")
          if [ "${#missing[@]}" -gt 0 ]; then
            printf 'Missing GitHub Actions secrets: %s\n' "${missing[*]}" >&2
            exit 1
          fi
        env:
          ANDROID_RELEASE_KEYSTORE_BASE64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_BASE64 }}
          ANDROID_RELEASE_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEYSTORE_PASSWORD }}
          ANDROID_RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}
          ANDROID_RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEY_PASSWORD }}

      - name: Decode Android release keystore
        run: |
          mkdir -p "${RUNNER_TEMP}/android-signing"
          printf '%s' "${ANDROID_RELEASE_KEYSTORE_BASE64}" | base64 --decode > "${RUNNER_TEMP}/android-signing/locoris-release.keystore"
          chmod 600 "${RUNNER_TEMP}/android-signing/locoris-release.keystore"
        env:
          ANDROID_RELEASE_KEYSTORE_BASE64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_BASE64 }}

      - name: Build signed Android APK
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/${{ env.ANDROID_NDK_VERSION }}
          ANDROID_SIGNING_KEYSTORE_PATH: ${{ runner.temp }}/android-signing/locoris-release.keystore
          ANDROID_SIGNING_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEYSTORE_PASSWORD }}
          ANDROID_SIGNING_KEY_ALIAS: ${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}
          ANDROID_SIGNING_KEY_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEY_PASSWORD }}
        run: npm run android:build:apk --workspace @locoris/app

      - name: Package Android release assets
        id: package
        shell: bash
        run: |
          set -euo pipefail
          VERSION="$(node -p "require('./apps/app/package.json').version")"
          if [[ "${GITHUB_REF_TYPE:-}" == "tag" && "${GITHUB_REF_NAME:-}" == app-v* ]]; then
            TAG="${GITHUB_REF_NAME}"
          else
            TAG="app-v${VERSION}"
          fi
          APK_SOURCE="$(find apps/app/src-tauri/gen/android/app/build/outputs/apk -type f -path '*/universal/release/*.apk' -name '*.apk' | sort | head -n 1)"
          if [ -z "${APK_SOURCE}" ]; then
            APK_SOURCE="$(find apps/app/src-tauri/gen/android/app/build/outputs/apk -type f -name '*release*.apk' | sort | head -n 1)"
          fi
          if [ -z "${APK_SOURCE}" ]; then
            echo "Could not find signed release APK." >&2
            exit 1
          fi
          mkdir -p dist/android-release
          APK_NAME="Locoris-Android-${VERSION}.apk"
          cp "${APK_SOURCE}" "dist/android-release/${APK_NAME}"
          if command -v sha256sum >/dev/null 2>&1; then
            SHA256="$(sha256sum "dist/android-release/${APK_NAME}" | awk '{print $1}')"
          else
            SHA256="$(shasum -a 256 "dist/android-release/${APK_NAME}" | awk '{print $1}')"
          fi
          printf '%s  %s\n' "${SHA256}" "${APK_NAME}" > "dist/android-release/${APK_NAME}.sha256"
          node -e "const fs=require('fs'); const data={version:process.argv[1],tag:process.argv[2],packageName:'com.locoris.android',apk:process.argv[3],sha256:process.argv[4],publishedAt:new Date().toISOString()}; fs.writeFileSync('dist/android-release/android-latest.json', JSON.stringify(data,null,2)+'\\n');" "${VERSION}" "${TAG}" "${APK_NAME}" "${SHA256}"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"
          echo "apk_name=${APK_NAME}" >> "${GITHUB_OUTPUT}"

      - name: Upload Android release assets artifact
        uses: actions/upload-artifact@v7
        with:
          name: locoris-android-release-assets
          path: dist/android-release/*
          if-no-files-found: error

  publish-android-assets:
    name: Publish Android assets
    needs:
      - release-desktop
      - build-android-apk
    runs-on: ubuntu-latest

    steps:
      - name: Download Android release assets
        uses: actions/download-artifact@v8
        with:
          name: locoris-android-release-assets
          path: dist/android-release

      - name: Upload Android assets to unified release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.build-android-apk.outputs.tag }}
        run: gh release upload "${TAG}" dist/android-release/* --clobber --repo angrein/locoris

  validate-release-metadata:
    needs:
      - release-desktop
      - publish-android-assets
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Resolve release version
        id: release-version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" && "${GITHUB_REF_NAME}" == app-v* ]]; then
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "version=${GITHUB_REF_NAME#app-v}" >> "$GITHUB_OUTPUT"
          else
            VERSION="$(node -p "require('./apps/app/package.json').version")"
            echo "tag=app-v${VERSION}" >> "$GITHUB_OUTPUT"
            echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate updater metadata
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >
          node ./scripts/validate-release-metadata.mjs
          --repo angrein/locoris
          --tag "${{ steps.release-version.outputs.tag }}"
          --expected-version "${{ steps.release-version.outputs.version }}"
          --targets "darwin-aarch64,windows-x86_64"
