name: Tauri desktop (macOS)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/app/src-tauri -> apps/app/src-tauri/target

      - name: Install deps
        run: npm ci

      - name: Build macOS bundle
        run: npm run desktop:build --workspace @locoris/app

      - name: Upload bundles
        uses: actions/upload-artifact@v4
        with:
          name: locoris-macos-bundle
          path: apps/app/src-tauri/target/release/bundle/
